<!DOCTYPE html>
<html>
<head>
    <title>Import Test</title>
</head>
<body>
    <h1>Testing Module Imports</h1>
    <div id="output"></div>
    
    <script type="module">
        const output = document.getElementById('output');
        
        try {
            output.innerHTML += '<p>Starting imports...</p>';
            
            const { ImageUploader } = await import('./src/imageUploader.js');
            output.innerHTML += '<p>✓ ImageUploader imported</p>';
            
            const { ModelSelector } = await import('./src/modelSelector.js');
            output.innerHTML += '<p>✓ ModelSelector imported</p>';
            
            const { SegmentationRunner } = await import('./src/segmentationRunner.js');
            output.innerHTML += '<p>✓ SegmentationRunner imported</p>';
            
            const { BoundaryDetector } = await import('./src/boundaryDetector.js');
            output.innerHTML += '<p>✓ BoundaryDetector imported</p>';
            
            const { GPTBoundaryDetector } = await import('./src/gptBoundaryDetector.js');
            output.innerHTML += '<p>✓ GPTBoundaryDetector imported</p>';
            
            output.innerHTML += '<p style="color: green; font-weight: bold;">All imports successful!</p>';
            
            // Try creating instances
            output.innerHTML += '<p>Creating instances...</p>';
            const uploader = new ImageUploader();
            output.innerHTML += '<p>✓ ImageUploader instance created</p>';
            
            const selector = new ModelSelector();
            output.innerHTML += '<p>✓ ModelSelector instance created</p>';
            
            const runner = new SegmentationRunner(uploader, selector);
            output.innerHTML += '<p>✓ SegmentationRunner instance created</p>';
            
            const detector = new BoundaryDetector(uploader, selector);
            output.innerHTML += '<p>✓ BoundaryDetector instance created</p>';
            
            const gptDetector = new GPTBoundaryDetector(uploader, selector);
            output.innerHTML += '<p>✓ GPTBoundaryDetector instance created</p>';
            
            output.innerHTML += '<p style="color: green; font-weight: bold;">All instances created successfully!</p>';
            
        } catch (error) {
            output.innerHTML += `<p style="color: red;">ERROR: ${error.message}</p>`;
            output.innerHTML += `<pre>${error.stack}</pre>`;
            console.error(error);
        }
    </script>
</body>
</html>
