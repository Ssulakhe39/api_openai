<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome back — BHUMI AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated background with floating rectangles */
        .bg-animation {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }
        
        .floating-rect {
            position: absolute;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            animation: float linear infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* Login card */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }
        
        .login-card {
            background: #151d2e;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid #2d3748;
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-logo-img {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
        }
        
        .login-logo h1 {
            font-size: 1.5rem;
            color: #00d9ff;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        
        .login-logo p {
            font-size: 0.875rem;
            color: #9ca3af;
        }
        
        .form-group { margin-bottom: 20px; }
        
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #e5e7eb;
            margin-bottom: 8px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #2d3748;
            border-radius: 8px;
            font-size: 0.9375rem;
            color: #e5e7eb;
            background: #1a2332;
            transition: all 0.2s;
            outline: none;
        }
        
        input:focus {
            border-color: #00d9ff;
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
        }
        
        input::placeholder {
            color: #6b7280;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #00d9ff;
            color: #0a0e1a;
            border: none;
            border-radius: 8px;
            font-size: 0.9375rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }
        
        .login-btn:hover:not(:disabled) {
            background: #00b8db;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.3);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .security-notice {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #f59e0b;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.8125rem;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.8125rem;
            margin-top: 16px;
            display: none;
        }
        
        .toggle-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.875rem;
            color: #9ca3af;
        }
        
        .toggle-link {
            color: #00d9ff;
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
            transition: color 0.2s;
        }
        
        .toggle-link:hover {
            color: #00b8db;
        }
        
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: #6b7280;
        }
        
        .footer-branding {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 32px;
            font-size: 0.75rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-animation" id="bgAnimation"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="/logo.svg" alt="BHUMI AI" class="login-logo-img">
                <h1>BHUMI AI</h1>
                <p id="subtitle-text">Authenticate to access the command system.</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">EMAIL</label>
                    <input type="text" id="username" placeholder="operator@bhumi.ai" autocomplete="username" required />
                </div>
                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
                </div>
                <div class="form-group" id="confirm-group" style="display:none;">
                    <label for="confirm-password">CONFIRM PASSWORD</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" />
                </div>
                
                <button type="submit" class="login-btn" id="login-btn">Initialize Session</button>
                
                <div class="security-notice">
                    <span>🔒</span>
                    <span>Connection secured via end-to-end encryption</span>
                </div>
                
                <div class="error-msg" id="error-msg"></div>
            </form>
            
            <div class="toggle-text">
                <span id="toggle-text">No clearance yet?</span>
                <a href="#" id="toggle-link" class="toggle-link">Request access</a>
            </div>
            
            <div class="footer-branding">
                <span>✦</span>
                <span>Made with Replit</span>
                <span>✦</span>
            </div>
        </div>
    </div>

    <script>
        // Create floating rectangles animation
        function createFloatingRects() {
            const container = document.getElementById('bgAnimation');
            const rectCount = 15;
            
            for (let i = 0; i < rectCount; i++) {
                const rect = document.createElement('div');
                rect.className = 'floating-rect';
                
                // Random size
                const size = Math.random() * 100 + 50;
                rect.style.width = size + 'px';
                rect.style.height = size * 1.4 + 'px';
                
                // Random horizontal position
                rect.style.left = Math.random() * 100 + '%';
                
                // Random animation duration
                const duration = Math.random() * 20 + 15;
                rect.style.animationDuration = duration + 's';
                
                // Random delay
                rect.style.animationDelay = Math.random() * 10 + 's';
                
                container.appendChild(rect);
            }
        }
        
        createFloatingRects();
        
        // Redirect if already authenticated
        if (sessionStorage.getItem('auth_token')) {
            window.location.href = '/';
        }

        let isRegister = false;

        document.getElementById('toggle-link').addEventListener('click', (e) => {
            e.preventDefault();
            isRegister = !isRegister;
            document.getElementById('confirm-group').style.display = isRegister ? 'block' : 'none';
            document.getElementById('login-btn').textContent = isRegister ? 'Create Account' : 'Initialize Session';
            document.getElementById('toggle-text').textContent = isRegister ? 'Already have clearance?' : 'No clearance yet?';
            document.getElementById('toggle-link').textContent = isRegister ? 'Sign In' : 'Request access';
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('subtitle-text').textContent = isRegister ? 'Create a new operator account' : 'Authenticate to access the command system.';
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errEl = document.getElementById('error-msg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            errEl.style.display = 'none';

            if (isRegister) {
                const confirm = document.getElementById('confirm-password').value;
                if (password !== confirm) {
                    errEl.textContent = 'Passwords do not match.';
                    errEl.style.display = 'block';
                    return;
                }
                if (password.length < 4) {
                    errEl.textContent = 'Password must be at least 4 characters.';
                    errEl.style.display = 'block';
                    return;
                }
            }

            btn.disabled = true;
            btn.textContent = isRegister ? 'Creating account…' : 'Authenticating…';

            try {
                const endpoint = isRegister ? '/api/auth/register' : '/api/auth/login';
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Request failed');

                sessionStorage.setItem('auth_token', data.token);
                sessionStorage.setItem('auth_user', username);
                sessionStorage.setItem('auth_login_time', Date.now());
                window.location.href = '/';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = isRegister ? 'Create Account' : 'Initialize Session';
            }
        });
    </script>
</body>
</html>
